<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width={{W}}, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{FONTS_LINK}}" rel="stylesheet">
<!-- DIRECTION: mono-terminal. Editor/terminal window + mono + // comments + caret. Best with a mono font. -->
<style>
  :root{--bg:{{BG}};--surface:{{SURFACE}};--text:{{TEXT}};--muted:{{MUTED}};--accent:{{ACCENT}};--accent2:{{ACCENT2}}}
  *{margin:0;padding:0;box-sizing:border-box}html,body{width:{{W}}px;height:{{H}}px;overflow:hidden}
  body{font-family:'{{BODY}}',monospace;color:var(--text)}
  .canvas{position:relative;width:{{W}}px;height:{{H}}px;background:var(--bg);padding:7vw;overflow:hidden;display:flex;flex-direction:column;justify-content:center}
  .dotgrid{position:absolute;inset:0;opacity:.4;background:radial-gradient(color-mix(in srgb,var(--text) 18%,transparent) 1.4px,transparent 1.4px) 0 0/34px 34px}
  .win{position:relative;z-index:2;background:var(--surface);border:1px solid color-mix(in srgb,var(--text) 16%,transparent);border-radius:16px;overflow:hidden;box-shadow:0 3vw 7vw rgba(0,0,0,.3)}
  .bar{display:flex;align-items:center;gap:1.2vw;padding:2vw 2.6vw;border-bottom:1px solid color-mix(in srgb,var(--text) 14%,transparent)}
  .bar i{width:1.6vw;height:1.6vw;border-radius:50%}.bar .r{background:#ff5f57}.bar .y{background:#febc2e}.bar .g{background:#28c840}
  .bar .t{margin-left:1.4vw;font-size:1.7vw;color:var(--muted)}
  .body{padding:4vw}
  .cmt{color:var(--muted);font-size:2vw;margin-bottom:2vw}
  .eyebrow{color:var(--accent);font-size:1.9vw;font-weight:700;margin-bottom:1.4vw}
  .headline{font-family:'{{DISPLAY}}',monospace;font-weight:800;font-size:5.6vw;line-height:1.1;letter-spacing:-.01em;color:var(--text);max-width:18ch}
  .headline em{font-style:normal;color:var(--accent)}
  .sub{margin-top:2.6vw;font-size:2.2vw;line-height:1.5;color:var(--muted)}
  .prompt{margin-top:3vw;font-size:2.3vw;color:var(--text)}
  .prompt b{color:var(--accent)}
  .caret{display:inline-block;width:1.1vw;height:2.4vw;background:var(--accent);transform:translateY(.4vw);margin-left:.4vw}
  .footer{position:relative;z-index:2;margin-top:3vw;display:flex;justify-content:space-between;font-size:1.9vw;color:var(--muted)}
</style></head>
<body><div class="canvas">
  <div class="dotgrid"></div>
  <div class="win">
    <div class="bar"><i class="r"></i><i class="y"></i><i class="g"></i><span class="t">~/{{HANDLE}} — zsh</span></div>
    <div class="body">
      <div class="cmt">// {{EYEBROW}}</div>
      <div class="eyebrow">$ run</div>
      <h1 class="headline">{{HEADLINE}}</h1>
      <p class="sub">{{SUBHEAD}}</p>
      <div class="prompt"><b>&gt;</b> {{CTA}}<span class="caret"></span></div>
    </div>
  </div>
  <div class="footer"><span>{{HANDLE}}</span><span>// swipe</span></div>
</div></body></html>
