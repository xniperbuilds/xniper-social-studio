<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width={{W}}, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{FONTS_LINK}}" rel="stylesheet">
<!-- DIRECTION: sketch-notebook. Dot-grid paper + marker headline + hand-drawn circle/arrow + handwritten accent. Best with a handwritten/marker body font. -->
<style>
  :root{--bg:{{BG}};--surface:{{SURFACE}};--text:{{TEXT}};--muted:{{MUTED}};--accent:{{ACCENT}};--accent2:{{ACCENT2}}}
  *{margin:0;padding:0;box-sizing:border-box}html,body{width:{{W}}px;height:{{H}}px;overflow:hidden}
  body{font-family:'{{BODY}}',sans-serif;color:var(--text)}
  .canvas{position:relative;width:{{W}}px;height:{{H}}px;background:var(--bg);padding:8vw;overflow:hidden;isolation:isolate;display:flex;flex-direction:column;justify-content:center}
  .dots{position:absolute;inset:0;z-index:0;opacity:.5;background:radial-gradient(color-mix(in srgb,var(--text) 22%,transparent) 1.6px,transparent 1.6px) 0 0/40px 40px}
  .eyebrow{position:relative;z-index:2;align-self:flex-start;font-family:'{{DISPLAY}}',sans-serif;font-size:2vw;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);border:.35vw solid var(--accent);border-radius:100px;padding:1vw 2.6vw;margin-bottom:3vw;transform:rotate(-1.5deg)}
  .headline{position:relative;z-index:2;font-family:'{{DISPLAY}}',sans-serif;font-weight:800;font-size:7.6vw;line-height:1.08;letter-spacing:-.01em;max-width:15ch}
  .headline em{font-style:normal;color:var(--accent);position:relative;white-space:nowrap}
  .circle{position:relative;z-index:2;align-self:flex-start;margin-top:-1vw}
  .circle svg{width:30vw;height:7vw}
  .sub{position:relative;z-index:2;margin-top:3vw;font-size:2.6vw;line-height:1.5;color:var(--muted);max-width:30ch}
  .accent{position:relative;z-index:2;margin-top:2.4vw;font-size:2.8vw;color:var(--accent2);display:inline-flex;align-items:center;gap:1.4vw}
  .accent svg{width:9vw;height:5vw}
  .footer{position:absolute;z-index:2;left:8vw;right:8vw;bottom:6vw;display:flex;justify-content:space-between;font-size:2vw;font-weight:700}
</style></head>
<body><div class="canvas">
  <div class="dots"></div>
  <span class="eyebrow">{{EYEBROW}}</span>
  <h1 class="headline">{{HEADLINE}}</h1>
  <span class="circle"><svg viewBox="0 0 300 60" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"><path d="M20 30 C 60 6, 250 6, 282 28 C 292 40, 230 56, 120 54 C 40 52, 14 44, 24 30"/></svg></span>
  <p class="sub">{{SUBHEAD}}</p>
  <span class="accent">{{CTA}}<svg viewBox="0 0 120 60" fill="none" stroke="var(--accent2)" stroke-width="4" stroke-linecap="round"><path d="M8 12 C 50 60, 80 58, 108 30"/><path d="M108 30 l-22 4 M108 30 l-4 -22"/></svg></span>
  <div class="footer"><span>{{HANDLE}}</span><span>// swipe</span></div>
</div></body></html>
